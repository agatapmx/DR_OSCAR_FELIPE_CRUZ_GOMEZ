<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Oscar Felipe Cruz Gómez </title>

<!-- Google Fonts:
     - Cormorant Garamond (serif, elegante) -> texto del sello y dirección
     - Poppins (sans-serif redondeada) -> botones de enlace
     - Caveat (manuscrita) -> frase decorativa -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@400;500;600&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root{
    /* ---- Paleta de colores (ajusta aquí si tu marca usa otros tonos) ---- */
    --cream: #f3ead9;          /* fondo del sello y tarjeta */
    --cream-soft: #f0e6d4;
    --olive: #55523c;          /* color de los botones */
    --olive-dark: #45422f;     /* hover de los botones */
    --ink: #333333;
    --ink-soft: #333333;
    --card-bg: rgba(243, 234, 217, 0.86); /* tarjeta translúcida sobre la foto */
    --shadow: rgba(40, 35, 20, 0.18);
  }

  *{
    box-sizing: border-box;
  }

  html, body{
    margin: 0;
    padding: 0;
    min-height: 100%;
  }

  body{
    font-family: 'Poppins', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 16px;

    background: #1a1608;
  }

  /* ============ IMAGEN DE FONDO ============ */
  .bg-wrapper{
    position: fixed;
    inset: 0;
    z-index: -1;
  }

  .bg-wrapper img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .bg-overlay{
    position: absolute;
    inset: 0;
    background: rgba(30, 24, 12, 0.25);
  }

  /* ============ TARJETA PRINCIPAL ============ */
  .card{
    position: relative;
    width: 100%;
    max-width: 380px;
    background: var(--card-bg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 32px;
    padding: 226px 28px 44px;
    box-shadow: 0 20px 45px var(--shadow);
    text-align: center;
  }

  /* ============ SELLO / LOGO OVALADO ============ */
  .seal{
    position: absolute;
    top: -38px;
    left: 50%;
    transform: translateX(-50%);
    width: 190px;
    height: 240px;
  }

  .seal-shape{
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--cream);
    box-shadow: 0 10px 25px var(--shadow);
    overflow: hidden;
  }

  .seal-shape img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ============ BOTONES DE ENLACE ============ */
  .links{
    list-style: none;
    margin: 0 0 28px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .links a{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #387C8A;
    color: #ffffff;
    text-decoration: none;
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.2px;
    padding: 16px 20px;
    border-radius: 999px;
    box-shadow: 0 6px 14px var(--shadow);
    transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
  }

  .links a i{
    font-size: 18px;
    flex-shrink: 0;
  }

  .links a:hover,
  .links a:focus-visible{
    background: #2d6875;
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 10px 20px var(--shadow);
  }

  .links a:active{
    transform: translateY(0) scale(0.99);
  }

  .links a:focus-visible{
    outline: 2px solid var(--ink);
    outline-offset: 3px;
  }

  /* ============ FRASE MANUSCRITA ============ */
  .tagline{
    font-family: 'Caveat', cursive;
    font-weight: 600;
    font-size: 26px;
    color: var(--ink-soft);
    margin: 6px 0 26px;
  }

  /* ============ DATOS DE CONTACTO ============ */
  .contact{
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink);
  }

  .contact p{
    margin: 0;
  }

  @media (max-width: 360px){
    .card{
      padding-top: 196px;
      border-radius: 26px;
    }
    .seal{
      width: 165px;
      height: 210px;
      top: -34px;
    }
    .links a{
      font-size: 15px;
      padding: 14px 18px;
    }
  }
</style>
</head>
<body>

  <!-- ============ IMAGEN DE FONDO ============
       Reemplaza la URL de abajo por el link de internet de tu imagen -->
  <div class="bg-wrapper">
    <img src="OSCAR fondo.png" alt="Fondo de Dr. Oscar Felipe Cruz Gómez">
    <div class="bg-overlay"></div>
  </div>

  <main class="card">

    <!-- ============ SELLO / LOGO ============
         Pon tu archivo de logo (por ejemplo "logo.png" o "logo.jpg")
         en esta misma carpeta, junto a este index.html, y cambia el
         "src" de abajo por su nombre de archivo. Idealmente cuadrado
         o vertical, se recorta en forma circular automáticamente. -->
    <div class="seal">
      <div class="seal-shape">
        <img src="OSCAR logo.jpg" alt="Logo Dr. Oscar Felipe Cruz Gómez">
      </div>
    </div>

    <!-- ============ ENLACES ============
         Reemplaza cada href="#" por la URL real de cada sección. -->
    <ul class="links">
      <li><a href="https://search.google.com/local/writereview?placeid=ChIJ_cNfNeOvKIQRkrge2UbY6W0" target="_blank" rel="noopener"><i class="fa-brands fa-google"></i> Google Reviews</a></li>
      <li><a href="https://www.instagram.com/lumont.clinic/" target="_blank" rel="noopener"><i class="fa-brands fa-instagram"></i> Instagram</a></li>
      <li><a href="https://wa.me/523318857875" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i> Contacto</a></li>
    </ul>

    <p class="tagline">Angiologia y Cirugia Vascular </p>

    <!-- ============ DATOS DE CONTACTO ============
         Cambia dirección, teléfono y usuario de redes por los reales. -->
    <div class="contact">
      <p>Av. Bethoven 5042, La Estancia, Zapopan, 45030 Guadalajara, Jal.</p>
      <p>(52) 33 1885 7875 | @lumont.clinic</p>
    </div>

  </main>

</body>
</html>
