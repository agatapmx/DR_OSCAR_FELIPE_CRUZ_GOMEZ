<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Oscar Felipe Cruz Gómez</title>

<!-- Google Fonts: Montserrat (sans-serif limpia y moderna) para todo el documento -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root{
    /* ---- Paleta de colores Angiomedyc ---- */
    --card-bg-color: #FFFFFF;      /* fondo blanco puro, apariencia clínica */
    --seal-bg: #FFFFFF;            /* fondo del óvalo del logo, blanco puro */
    --btn-bg: #407BCE;             /* azul del logotipo Angiomedyc */
    --btn-hover: #C42026;          /* rojo del logotipo Angiomedyc */
    --btn-text: #FFFFFF;
    --ink: #4A4A4A;                /* gris oscuro para texto general */
    --card-bg: rgba(255, 255, 255, 0.92); /* tarjeta translúcida sobre la foto */
    --shadow: rgba(20, 30, 45, 0.20);
  }

  *{
    box-sizing: border-box;
  }

  html, body{
    margin: 0;
    padding: 0;
    min-height: 100%;
  }

  body{
    font-family: 'Montserrat', 'Helvetica', 'Roboto', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 16px;

    background: #0d1520;
  }

  /* ============ IMAGEN DE FONDO ============ */
  .bg-wrapper{
    position: fixed;
    inset: 0;
    z-index: -1;
  }

  .bg-wrapper img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .bg-overlay{
    position: absolute;
    inset: 0;
    /* Overlay oscuro en tonos azul/gris para que la tarjeta blanca resalte */
    background: linear-gradient(180deg, rgba(10, 20, 35, 0.55), rgba(10, 20, 35, 0.65));
  }

  /* ============ TARJETA PRINCIPAL ============ */
  .card{
    position: relative;
    width: 100%;
    max-width: 380px;
    background: var(--card-bg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 32px;
    padding: 226px 28px 44px;
    box-shadow: 0 20px 45px var(--shadow);
    text-align: center;
  }

  /* ============ SELLO / LOGO OVALADO (acostado) ============ */
  .seal{
    position: absolute;
    top: -38px;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 190px;
  }

  .seal-shape{
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--cream);
    box-shadow: 0 10px 25px var(--shadow);
    overflow: hidden;
  }

  .seal-shape img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ============ BOTONES DE ENLACE ============ */
  .links{
    list-style: none;
    margin: 0 0 28px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .links a{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--btn-bg);
    color: var(--btn-text);
    text-decoration: none;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.2px;
    padding: 16px 20px;
    border-radius: 999px;
    box-shadow: 0 6px 14px var(--shadow);
    transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
  }

  .links a i{
    font-size: 18px;
    flex-shrink: 0;
  }

  .links a:hover,
  .links a:focus-visible{
    background: var(--btn-hover);
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 10px 20px var(--shadow);
  }

  .links a:active{
    transform: translateY(0) scale(0.99);
  }

  .links a:focus-visible{
    outline: 2px solid var(--ink);
    outline-offset: 3px;
  }

  /* ============ DATOS DE CONTACTO ============ */
  .contact{
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
  }

  .contact p{
    margin: 0;
  }

  .contact p.name{
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 4px;
    color: var(--ink);
  }

  @media (max-width: 360px){
    .card{
      padding-top: 196px;
      border-radius: 26px;
    }
    .seal{
      width: 165px;
      height: 210px;
      top: -34px;
    }
    .links a{
      font-size: 15px;
      padding: 14px 18px;
    }
  }
</style>
</head>
<body>

  <!-- ============ IMAGEN DE FONDO ============
       Placeholder de Unsplash: entorno clínico/médico desenfocado en tonos azul-gris.
       Puedes sustituir la URL por tu propia imagen si lo prefieres. -->
  <div class="bg-wrapper">
    <img src="OSCAR fondo_FINAL.png" alt="Fondo Dr. Oscar Felipe Cruz Gómez">
    <div class="bg-overlay"></div>
  </div>

  <main class="card">

    <!-- ============ SELLO / LOGO ============
         Fondo del óvalo en blanco puro para que el logo de Angiomedyc resalte. -->
    <div class="seal">
      <div class="seal-shape">
        <!-- Insertar imagen del logo aquí -->
        <img src="OSCAR logo.png" alt="Logo Dr. Oscar Felipe Cruz Gómez">
      </div>
    </div>

    <!-- ============ ENLACES ============
         Reemplaza cada href por la URL real de cada sección. -->
    <ul class="links">
      <li><a href="https://search.google.com/local/writereview?placeid=ChIJ8Yd-DQCvKIQRWvxTqMtm8As" target="_blank" rel="noopener"><i class="fa-brands fa-google"></i> Google Reviews</a></li>
      <li><a href="https://www.instagram.com/angiomedyc/" target="_blank" rel="noopener"><i class="fa-brands fa-instagram"></i> Instagram</a></li>
      <li><a href="https://wa.me/523336276897" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i> Contacto</a></li>
    </ul>

    <!-- ============ DATOS DE CONTACTO ============
         Cambia dirección, teléfono y usuario de redes por los reales. -->
    <div class="contact">
      <p class="name">Angiologo Dr. Oscar F.Cruz Gómez</p>
      <p>Centro Avanzado de Heridas y Pie Diabético</p>
      <p>Del Tule 792 A, Puertas del Tule, 45117 Zapopan, Jal.</p>
      <p>(52) 3336276897 | @angiomedyc</p>
    </div>

  </main>

</body>
</html>
